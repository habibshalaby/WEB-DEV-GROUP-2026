<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UGym & PowerZone — Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&family=Space+Mono&display=swap" rel="stylesheet">

</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo"><span class="u">U</span>GYM <span style="color:var(--border)">|</span> <span class="p">POWER</span>ZONE</div>
  <div class="tabs">
    <a class="tab" href="membership.html"> Select Membership</a>
    <a class="tab active" href="checkout.html"> Checkout</a>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="page">
  <div class="s2-wrap">
    <div id="s2-header-area"></div>
    <div id="checkout"></div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <div class="cost-preview" id="preview">—</div>
  <div class="nav-arrows">
    <a class="arr" href="membership.html">← Back</a>
    <button class="arr primary pay-bar-btn ugym" id="payBtn" style="display:none" onclick="alert('Redirecting to payment...')">
      Pay <span id="payAmount">—</span>
    </button>
  </div>
</div>

</html>
